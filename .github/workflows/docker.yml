name: CI / Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: loginlogbook-api

      - name: Run tests
        run: python -m pytest
        working-directory: loginlogbook-api

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y libgl1 libglib2.0-0 libdbus-1-3

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: loginlogbook-client

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest
        working-directory: loginlogbook-client

  build:
    needs: [test-api, test-client]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ozon08/loginlogbook-api
          tags: |
            # every commit on main → :dev
            type=raw,value=dev,enable=${{ github.event_name == 'push' }}
            # release v1.2.3 → :v1.2.3
            type=semver,pattern={{raw}}
            # release v1.2.3 → :v1.2
            type=semver,pattern=v{{major}}.{{minor}}
            # release v1.2.3 → :v1
            type=semver,pattern=v{{major}}
            # release       → :latest
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./loginlogbook-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ozon08/loginlogbook-api
          readme-filepath: ./loginlogbook-api/DOCKERHUB.md
