services:
  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    environment:
      # Remove DOCKER_INFLUXDB_INIT_MODE after the first start
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: change-me-strong-password
      DOCKER_INFLUXDB_INIT_ORG: loginlogbook
      DOCKER_INFLUXDB_INIT_BUCKET: logins
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: change-me-influx-token
    volumes:
      - influx-data:/var/lib/influxdb2
    networks:
      - internal

  api:
    image: ghcr.io/ozon08/loginlogbook-api:latest
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: change-me-influx-token
      INFLUX_ORG: loginlogbook
      INFLUX_BUCKET: logins
      ADMIN_TOKEN: change-me-admin-token
      CLIENT_TOKEN: change-me-client-token
      REASONS_FILE: /data/reasons.json
      LOGO_DIR: /data/logo
      CLIENTS_FILE: /data/clients.json
    volumes:
      - api-data:/data
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal

networks:
  internal:

volumes:
  influx-data:
  api-data:
