services:
  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    env_file: .env
    volumes:
      - influx-data:/var/lib/influxdb2
    networks:
      - internal

  api:
    image: ozon08/loginlogbook-api:latest
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    env_file: .env
    volumes:
      - api-data:/data
    networks:
      - internal

  grafana:
    image: grafana/grafana:13.1.0
    restart: unless-stopped
    depends_on:
      - influxdb
    environment:
      GF_SERVER_ROOT_URL: "https://${TLS_DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - internal

  certs-init:
    image: alpine/openssl:3.5.7
    env_file: .env
    entrypoint: /bin/sh
    command: -c "/scripts/certs-init.sh"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:rw
      - ./scripts:/scripts:ro
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # Reload every 6h so renewed certbot certs are picked up without a restart.
    command: /bin/sh -c "while :; do sleep 6h & wait $$!; nginx -s reload; done & nginx -g 'daemon off;'"
    depends_on:
      certs-init:
        condition: service_completed_successfully
      api:
        condition: service_started
      grafana:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/errors:/etc/nginx/errors:ro
      - ./nginx/certbot-webroot:/var/www/certbot:ro
    networks:
      - internal

  certbot:
    image: certbot/certbot:v5.7.0
    profiles: ["certbot"]
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --deploy-hook /scripts/deploy-hook.sh; sleep 12h & wait $$!; done"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./nginx/certbot-webroot:/var/www/certbot
      - ./nginx/certs:/etc/nginx/certs:rw
      - ./scripts:/scripts:ro
    networks:
      - internal

networks:
  internal:

volumes:
  influx-data:
  api-data:
  grafana-data:
  letsencrypt:
