services:
  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    env_file: .env
    volumes:
      - influx-data:/var/lib/influxdb2
    networks:
      - internal

  api:
    image: ozon08/loginlogbook-api:latest
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    env_file: .env
    volumes:
      - api-data:/data
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal

networks:
  internal:

volumes:
  influx-data:
  api-data:
