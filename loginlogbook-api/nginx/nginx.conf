events {}

http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_status 429;

    map $http_accept_language $err_lang {
        default    de;
        "~*^en"    en;
    }

    server {
        listen 80;

        # Let's Encrypt HTTP-01 challenge — must win over the redirect below.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;

        error_page 502 503 504 @err5xx;
        error_page 429 @err429;
        location @err5xx {
            root /etc/nginx/errors;
            try_files /50x.$err_lang.html /50x.de.html =502;
            internal;
        }
        location @err429 {
            root /etc/nginx/errors;
            try_files /429.$err_lang.html /429.de.html =429;
            internal;
        }

        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
