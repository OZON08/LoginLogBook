<svg width="680" height="300" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LoginLogBook logo">
  <title>LoginLogBook</title>
  <desc>An open book combined with a login key and a green checkmark, next to the wordmark LoginLogBook.</desc>

  <g transform="translate(70,70)">
    <!-- book base -->
    <rect x="0" y="20" width="160" height="120" rx="10" fill="#E8EEFB" stroke="#2A61D6" stroke-width="2"/>
    <!-- spine -->
    <rect x="76" y="20" width="8" height="120" rx="2" fill="#2A61D6"/>
    <!-- left page lines -->
    <line x1="20" y1="52"  x2="66" y2="52"  stroke="#2A61D6" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="20" y1="72"  x2="66" y2="72"  stroke="#2A61D6" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="20" y1="92"  x2="66" y2="92"  stroke="#2A61D6" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="20" y1="112" x2="52" y2="112" stroke="#2A61D6" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <!-- right page: key -->
    <circle cx="112" cy="66" r="16" fill="none" stroke="#2A61D6" stroke-width="6"/>
    <circle cx="112" cy="66" r="5" fill="#FFFFFF"/>
    <line x1="112" y1="82"  x2="112" y2="116" stroke="#2A61D6" stroke-width="6" stroke-linecap="round"/>
    <line x1="112" y1="104" x2="126" y2="104" stroke="#2A61D6" stroke-width="6" stroke-linecap="round"/>
    <line x1="112" y1="116" x2="124" y2="116" stroke="#2A61D6" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- check badge -->
  <g transform="translate(198,158)">
    <circle cx="0" cy="0" r="26" fill="#1F9E56" stroke="#FFFFFF" stroke-width="4"/>
    <path d="M-11 0 L-3 9 L12 -9" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="280" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="600" fill="#1A1A1A">Login<tspan fill="#2A61D6">Log</tspan>Book</text>
  <text x="282" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" fill="#5A5A5A">Anmelde-Protokollierung</text>
</svg>
